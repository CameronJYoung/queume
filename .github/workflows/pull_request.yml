name: Queueme Pull Request

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Cargo Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v5

      - name: Install Rust Toolchain
        uses: action-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Run Cargo Tests
        run: cargo test
